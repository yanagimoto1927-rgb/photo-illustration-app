<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>写真イラスト化アプリ</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>🎨 写真イラスト化アプリ</h1>

<input
type="file"
id="imageInput"
accept="image/*"
>

<div class="preview">

<img
id="previewImage"
src=""
style="display:none;"
>

</div>

<button id="generateButton">

イラスト化

</button>

<h2>結果</h2>

<div class="result">

<img
id="resultImage"
src=""
style="display:none;"
>

</div>
<a
  id="downloadBtn"
  href="#"
  download="illustration.png"
  style="display:none;"
  class="download-btn"
>
📥 イラストをダウンロード
</a>

</div>

<script src="script.js"></script>

</body>
</html>
